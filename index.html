<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>每日任务打卡系统</title>
    <style>
        :root {
            --primary-color: #0E4C98;
            --secondary-color: #E0CEC8;
            --accent-color: #B66845;
            --text-color: #171C31;
            --background-color: #DDC08B;
            --card-background: #FFFFFF;
            --shadow-color: rgba(14, 76, 152, 0.2);
            --font-family: 'SimSun', '宋体', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            line-height: 1.6;
            background-color: var(--background-color);
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        /* 加载提示样式 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            flex-direction: column;
        }
        
        .loading.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 左侧边栏样式 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 280px;
            background: var(--card-background);
            box-shadow: 2px 0 10px var(--shadow-color);
            transition: transform 0.3s ease;
            z-index: 1001;
            transform: translateX(-280px); /* 默认隐藏 */
        }

        .sidebar.expanded {
            transform: translateX(0); /* 展开时显示 */
        }

        .sidebar-toggle {
            position: absolute;
            right: -30px;
            top: 20px;
            width: 30px;
            height: 60px;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            font-size: 18px;
        }

        .sidebar-content {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }

        /* 头像样式 */
        .avatar-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 3px solid var(--primary-color);
            transition: transform 0.3s;
            margin: 0 auto;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .avatar:hover .avatar-overlay {
            opacity: 1;
        }

        /* 昵称样式 */
        .nickname-section {
            margin-bottom: 30px;
        }

        .nickname-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: var(--secondary-color);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nickname-display:hover {
            background: var(--primary-color);
            color: white;
        }

        .nickname-input {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            margin-top: 10px;
        }

        /* 点数样式 */
        .points-section {
            margin-bottom: 30px;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            border-radius: 10px;
            color: white;
        }

        .points-label {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .points-value {
            font-size: 24px;
            font-weight: bold;
        }

        /* 操作按钮样式 */
        .actions-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .actions-section button {
            width: 100%;
        }

        /* 主容器样式 */
        .container {
            margin-left: 0;
            transition: margin-left 0.3s ease;
            max-width: 100%;
        }

        .container.expanded {
            margin-left: 280px;
            max-width: calc(100% - 280px);
        }

        .login-form, .main-content, .history-content, .hidden-content {
            display: none;
            background: var(--card-background);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .login-form.active, .main-content.active, .history-content.active, .hidden-content.active {
            display: block;
        }

        h1, h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .points-display {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .section {
            background: var(--secondary-color);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px var(--shadow-color);
        }

        .section h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .task-item, .reward-item, .history-item, .archive-item {
            background: var(--card-background);
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px var(--shadow-color);
            transition: transform 0.2s;
        }

        .task-item:hover, .reward-item:hover, .history-item:hover, .archive-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin: 0 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        button.danger {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--primary-color) 100%);
        }

        input[type="text"], input[type="password"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 2px solid var(--secondary-color);
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus, textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: var(--card-background);
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .close {
            color: var(--text-color);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: var(--primary-color);
        }

        .task-completed {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .reward-redeemed {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            color: white;
        }

        /* 搜索框样式 */
        .search-box {
            margin-bottom: 20px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 2px solid var(--secondary-color);
            border-radius: 25px;
            font-size: 16px;
        }

        .search-box::after {
            content: "🔍";
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        /* 悬浮球样式 */
        .floating-ball {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: all 0.3s;
            z-index: 1000;
        }

        .floating-ball:hover {
            transform: scale(1.1);
        }

        .color-ball {
            right: 20px;
            bottom: 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
        }

        .color-ball::before {
            content: "🎨";
            font-size: 20px;
        }

        .font-ball {
            right: 20px;
            bottom: 80px;
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
        }

        .font-ball::before {
            content: "Aa";
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .history-ball {
            right: 20px;
            bottom: 140px;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--secondary-color) 100%);
        }

        .history-ball::before {
            content: "📚";
            font-size: 20px;
        }

        /* 色卡选择器 */
        .color-picker {
            position: fixed;
            right: 80px;
            bottom: 20px;
            background: var(--card-background);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow-color);
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            z-index: 999;
            max-width: 400px;
        }

        .color-picker.active {
            display: grid;
        }

        .color-theme {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .color-theme:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px var(--shadow-color);
        }

        .color-options {
            display: flex;
            gap: 3px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .color-label {
            font-size: 10px;
            color: var(--text-color);
            text-align: center;
        }

        /* 字体选择器 */
        .font-picker {
            position: fixed;
            right: 80px;
            bottom: 80px;
            background: var(--card-background);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow-color);
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
        }

        .font-picker.active {
            display: flex;
        }

        .font-option {
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--secondary-color);
            text-align: center;
        }

        .font-option:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px var(--shadow-color);
        }

        /* 历史记录样式 */
        .history-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .archive-content {
            background: var(--card-background);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .archive-image {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .archive-image:hover {
            transform: scale(1.05);
        }

        /* 图片预览模态框 */
        .image-preview {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            cursor: pointer;
        }

        .image-preview img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        /* 字体主题 */
        .font-song {
            --font-family: 'SimSun', '宋体', serif;
        }

        .font-round {
            --font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
        }

        .font-black {
            --font-family: 'SimHei', '黑体', sans-serif;
        }

        /* 主题色系 */
        .theme-1 {
            --primary-color: #0E4C98;
            --secondary-color: #E0CEC8;
            --accent-color: #B66845;
            --text-color: #171C31;
            --background-color: #DDC08B;
            --shadow-color: rgba(14, 76, 152, 0.2);
        }

        .theme-2 {
            --primary-color: #B84C3A;
            --secondary-color: #F5A7BB;
            --accent-color: #A64568;
            --text-color: #35201C;
            --background-color: #4E6B5E;
            --shadow-color: rgba(184, 76, 58, 0.2);
        }

        .theme-3 {
            --primary-color: #BE9D32;
            --secondary-color: #91AED4;
            --accent-color: #DDCA6E;
            --text-color: #444C83;
            --background-color: #ACA584;
            --shadow-color: rgba(190, 157, 50, 0.2);
        }

        .theme-4 {
            --primary-color: #392B43;
            --secondary-color: #DBDFE6;
            --accent-color: #75CFE4;
            --text-color: #DDB6E0;
            --background-color: #A75EC3;
            --shadow-color: rgba(57, 43, 67, 0.2);
        }

        .theme-5 {
            --primary-color: #C7586B;
            --secondary-color: #EEEAED;
            --accent-color: #E9C0B2;
            --text-color: #EBA4BD;
            --background-color: #F0DD71;
            --shadow-color: rgba(199, 88, 107, 0.2);
        }

        .theme-6 {
            --primary-color: #821408;
            --secondary-color: #D6A819;
            --accent-color: #D27E26;
            --text-color: #BF2F21;
            --background-color: #A16104;
            --shadow-color: rgba(130, 20, 8, 0.2);
        }

        .theme-7 {
            --primary-color: #FEEDA9;
            --secondary-color: #FCB913;
            --accent-color: #FDE488;
            --text-color: #FC8D13;
            --background-color: #FC7806;
            --shadow-color: rgba(254, 237, 169, 0.2);
        }

        .theme-8 {
            --primary-color: #6F5639;
            --secondary-color: #C5B69B;
            --accent-color: #1D110D;
            --text-color: #D55A2A;
            --background-color: #D7B528;
            --shadow-color: rgba(111, 86, 57, 0.2);
        }

        .theme-9 {
            --primary-color: #BEBEBE;
            --secondary-color: #7A848D;
            --accent-color: #A9B7AA;
            --text-color: #DBD4C6;
            --background-color: #95A098;
            --shadow-color: rgba(190, 190, 190, 0.2);
        }

        .theme-10 {
            --primary-color: #60656C;
            --secondary-color: #728A7A;
            --accent-color: #D4C3AA;
            --text-color: #A39183;
            --background-color: #B09279;
            --shadow-color: rgba(96, 101, 108, 0.2);
        }

        .forgot-password {
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: underline;
            margin-top: 10px;
            display: inline-block;
        }

        .forgot-password:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .container {
                margin-left: 0;
                max-width: 100%;
                padding: 15px;
            }

            .container.expanded {
                margin-left: 0;
            }

            .sidebar {
                width: 100%;
                transform: translateX(-100%);
            }

            .sidebar.expanded {
                transform: translateX(0);
            }

            .sidebar-toggle {
                right: auto;
                left: 100%;
                border-radius: 0 8px 8px 0;
            }

            .sidebar.expanded .sidebar-toggle {
                left: auto;
                right: 0;
            }

            .content-grid, .history-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            .floating-ball {
                width: 40px;
                height: 40px;
            }

            .color-ball {
                right: 15px;
                bottom: 15px;
            }

            .font-ball {
                right: 15px;
                bottom: 65px;
            }

            .history-ball {
                right: 15px;
                bottom: 115px;
            }

            .color-picker {
                right: 65px;
                bottom: 15px;
                max-width: 300px;
            }

            .font-picker {
                right: 65px;
                bottom: 65px;
            }

            .archive-image {
                width: 100%;
                height: auto;
            }
        }
        /* 横屏样式 */
        @media (orientation: landscape) {
            .container {
                margin-left: 0;
                max-width: 100%;
            }
            
            .container.expanded {
                margin-left: 280px;
                max-width: calc(100% - 280px);
            }
            
            .sidebar {
                transform: translateX(-280px);
            }
            
            .sidebar.expanded {
                transform: translateX(0);
            }
            
            .sidebar-toggle {
                right: auto;
                left: 100%;
            }
            
            .content-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 15px;
            }
            
            .history-grid {
                grid-template-columns: 1fr;
            }
            
            .points-display {
                font-size: 1.2em;
                padding: 12px;
            }
            
            h1 {
                font-size: 1.5em;
                margin-bottom: 15px;
            }
            
            h2 {
                font-size: 1.2em;
            }
            
            /* 调整悬浮球位置 */
            .floating-ball {
                width: 40px;
                height: 40px;
            }
            
            .color-ball {
                right: 10px;
                bottom: 10px;
            }
            
            .font-ball {
                right: 10px;
                bottom: 60px;
            }
            
            .history-ball {
                right: 10px;
                bottom: 110px;
            }
            
            /* 调整色卡选择器位置 */
            .color-picker {
                right: 60px;
                bottom: 10px;
                max-width: 350px;
            }
            
            .font-picker {
                right: 60px;
                bottom: 60px;
            }
            
            /* 调整模态框大小 */
            .modal-content {
                width: 90%;
                margin: 5% auto;
                padding: 20px;
            }
            
            /* 调整任务和奖励项 */
            .task-item, .reward-item, .history-item, .archive-item {
                padding: 8px;
                font-size: 0.9em;
            }
            
            button {
                padding: 8px 15px;
                font-size: 0.9em;
            }
            
            /* 调整头像区域 */
            .avatar {
                width: 80px;
                height: 80px;
            }
            
            .points-section {
                padding: 15px;
            }
            
            .points-value {
                font-size: 20px;
            }
        }

        /* 竖屏样式优化 */
        @media (orientation: portrait) {
            .container {
                margin-left: 0;
                max-width: 100%;
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
        /* 横屏时的额外优化 */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                padding: 10px;
            }
            
            .login-form, .main-content, .history-content, .hidden-content {
                padding: 15px;
            }
            
            .section {
                padding: 15px;
            }
            
            .points-display {
                margin-bottom: 20px;
                padding: 10px;
            }
            
            .content-grid {
                gap: 10px;
                margin-bottom: 20px;
            }
            
            /* 压缩任务和奖励项的垂直间距 */
            .task-item, .reward-item, .history-item, .archive-item {
                margin: 5px 0;
                padding: 6px;
            }
            
            /* 调整按钮大小 */
            button {
                padding: 6px 12px;
                font-size: 0.85em;
            }
            
            /* 调整标题大小 */
            h1 {
                font-size: 1.3em;
                margin-bottom: 10px;
            }
            
            h2 {
                font-size: 1.1em;
                margin-bottom: 10px;
                padding-bottom: 5px;
            }
        }

        /* 横屏且宽度较大时的优化 */
        @media (orientation: landscape) and (min-width: 1024px) {
            .content-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 20px;
            }
            
            .history-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .container {
                margin-left: 0;
                max-width: 100%;
            }
            
            .container.expanded {
                margin-left: 280px;
                max-width: calc(100% - 280px);
            }
        }
    </style>
</head>
<body>
    <!-- 加载提示 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>正在同步数据...</div>
    </div>

    <!-- 左侧展开式版面 -->
    <div class="sidebar" id="sidebar">

    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.13.2/dist/av-min.js"></script>
    <script>
        // 全局变量
        let currentUser = null;
        let userData = null;
        let currentArchiveRewardId = null;
        let isInputActive = false; // 新增：输入状态标志

        // 初始化 LeanCloud - 替换成你自己的配置
        function initLeanCloud() {
            AV.init({
                appId: "8jGH9Et6mCtOzvF1sc9czCXQ-gzGzoHsz", // 替换成你的 AppID
                appKey: "MgQqsAdChWgS5P20MHPKG8gD", // 替换成你的 AppKey
                serverURL: "https://8jgh9et6.lc-cn-n1-shared.com" // 替换成你的 ServerURL
            });
            console.log('LeanCloud 初始化成功');
        }

        // 显示加载提示
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }

        // 隐藏加载提示
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }


        // 初始化
        window.onload = async function() {
            // 初始化 LeanCloud
            initLeanCloud();
            
            // 加载保存的主题和字体
            const savedTheme = localStorage.getItem('selectedTheme');
            const savedFont = localStorage.getItem('selectedFont');
            if (savedTheme) document.body.className = savedTheme;
            if (savedFont) document.body.classList.add(savedFont);

            // 初始化设备方向
            handleOrientationChange();
            
            // 初始化侧边栏状态：默认收起
            const sidebar = document.getElementById('sidebar');
            const container = document.getElementById('container');
            const toggleIcon = document.getElementById('toggleIcon');

            // 确保侧边栏默认收起
            sidebar.classList.remove('expanded');
            container.classList.remove('expanded');
            toggleIcon.textContent = '▶';

        // 检查是否已登录
        const currentUser = AV.User.current();
        if (currentUser) {
            showLoading();
            try {
                await loadUserData(); // 这会加载包含头像的用户数据
                showMainContent();
                updateDisplay();
                loadUserProfile(); // 确保调用这个函数来设置头像
            } catch (error) {
                console.error('加载用户数据失败:', error);
                alert('加载用户数据失败，请检查网络连接');
            } finally {
                hideLoading();
            }
        } else {
            // 未登录时重置侧边栏显示
            document.getElementById('avatarImage').src = '';
            document.getElementById('nicknameText').textContent = '用户昵称';
            document.getElementById('totalPoints').textContent = '0';
        }
                        }
            
            // 添加输入框焦点事件监听
            document.addEventListener('focusin', function() {
                isInputActive = true;
                console.log('输入框获得焦点，暂停布局调整');
            });
            
            document.addEventListener('focusout', function() {
                isInputActive = false;
                console.log('输入框失去焦点，恢复布局调整');
                // 延迟执行布局调整，确保虚拟键盘已收起
                setTimeout(adjustLayoutForOrientation, 300);
            });
        ;
        // 检测设备方向变化
        function handleOrientationChange() {
            const isLandscape = window.matchMedia("(orientation: landscape)").matches;
            
            if (isLandscape) {
                document.body.classList.add('landscape');
                document.body.classList.remove('portrait');
                console.log('横屏模式');
            } else {
                document.body.classList.add('portrait');
                document.body.classList.remove('landscape');
                console.log('竖屏模式');
            }
            
            // 调整布局
            adjustLayoutForOrientation();
        }

        // 根据方向调整布局 - 修复：避免在输入时调整
        function adjustLayoutForOrientation() {
            // 如果正在输入，不调整布局
            if (isInputActive) {
                console.log('正在输入，跳过布局调整');
                return;
            }
            
            const isLandscape = window.matchMedia("(orientation: landscape)").matches;
            const sidebar = document.getElementById('sidebar');
            const container = document.getElementById('container');
            
            // 不再自动调整侧边栏，由用户手动控制
        }

        // 监听方向变化
        window.addEventListener('orientationchange', function() {
            // 添加延迟以确保方向变化完成
            setTimeout(handleOrientationChange, 100);
        });

        // 监听窗口大小变化（某些设备方向变化也会触发resize）
        window.addEventListener('resize', function() {
            // 防抖处理，避免频繁触发
            clearTimeout(this.resizeTimeout);
            this.resizeTimeout = setTimeout(handleOrientationChange, 100);
        });

        // 从云数据库加载用户数据
        async function loadUserData() {
            const currentUser = AV.User.current();
            if (!currentUser) return;

            try {
                // 查询用户数据
                const query = new AV.Query('UserData');
                query.equalTo('user', currentUser);
                const results = await query.find();
                
                if (results.length > 0) {
                    // 有数据，直接使用
                    userData = results[0].get('data');
                    console.log('从云端加载用户数据成功');
                } else {
                    // 没有数据，创建新的
                    userData = {
                        currentPoints: 0,
                        tasks: [],
                        rewards: [],
                        pointsHistory: [],
                        rewardsArchive: [],
                        avatar: null // 添加头像字段
                    };
                    await saveUserDataToCloud();
                    console.log('创建新的用户数据');
                }
                
                // 加载头像和昵称
                loadUserProfile();
                } catch (error) {
                    console.error('加载用户数据失败:', error);
                    throw error;
                }
        }

        // 加载用户个人资料
        function loadUserProfile() {
            const currentUser = AV.User.current();
            if (!currentUser) return;

            const avatarImage = document.getElementById('avatarImage');
            
            // 从云端数据加载头像
            if (userData && userData.avatar) {
                avatarImage.src = userData.avatar;
                // 添加加载失败处理
                avatarImage.onerror = function() {
                    console.error('头像加载失败');
                    // 可以设置一个默认头像
                    avatarImage.src = ''; // 或者设置一个默认头像URL
                };
            } else {
                // 设置默认头像或清空
                avatarImage.src = '';
            }
            
            // 加载昵称
            const nickname = currentUser.get('nickname') || '用户昵称';
            document.getElementById('nicknameText').textContent = nickname;
        }

        
        // 保存用户数据到云数据库
        async function saveUserDataToCloud() {
            const currentUser = AV.User.current();
            if (!currentUser || !userData) return;

            try {
                // 先查询是否已存在
                const query = new AV.Query('UserData');
                query.equalTo('user', currentUser);
                const results = await query.find();
                
                let userDataObject;
                if (results.length > 0) {
                    // 更新现有数据
                    userDataObject = results[0];
                } else {
                    // 创建新数据
                    userDataObject = new AV.Object('UserData');
                    userDataObject.set('user', currentUser);
                }
                
                userDataObject.set('data', userData);
                await userDataObject.save();
                console.log('用户数据已保存到云端');
            } catch (error) {
                console.error('保存用户数据到云端失败:', error);
                throw error;
            }
        }

        // 保存用户数据（统一入口）
        async function saveUserData() {
            showLoading();
            try {
                await saveUserDataToCloud();
            } catch (error) {
                console.error('保存用户数据失败:', error);
                alert('数据同步失败，请检查网络连接');
            } finally {
                hideLoading();
            }
        }

        // 登录功能
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }
            
            showLoading();
            try {
                const user = await AV.User.logIn(username, password);
                currentUser = user;
                await loadUserData();
                showMainContent();
                updateDisplay();
                console.log('登录成功');
            } catch (error) {
                console.error('登录失败:', error);
                if (error.code === 210) {
                    alert('用户名或密码错误！');
                } else if (error.code === 211) {
                    alert('用户不存在！');
                } else {
                    alert('登录失败：' + error.message);
                }
            } finally {
                hideLoading();
            }
        }

        // 注册功能 - 简化版（不需要邮箱）
        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            if (!username || !password) {
                alert('请填写完整信息！');
                return;
            }
            
            // 简单的用户名验证
            if (username.length < 3) {
                alert('用户名至少3个字符！');
                return;
            }
            if (password.length < 6) {
                alert('密码至少6个字符！');
                return;
            }
            
            showLoading();
            try {
                const user = new AV.User();
                user.setUsername(username);
                user.setPassword(password);
                // 设置一个虚拟邮箱（避免邮箱验证）
                user.setEmail(`${username}@dummy.com`);
                
                await user.signUp();
                
                // 初始化用户数据
                userData = {
                    currentPoints: 0,
                    tasks: [],
                    rewards: [],
                    pointsHistory: [],
                    rewardsArchive: []
                };
                
                await saveUserDataToCloud();
                closeRegisterModal();
                showMainContent();
                updateDisplay();
                console.log('注册成功');
            } catch (error) {
                console.error('注册失败:', error);
                if (error.code === 202) {
                    alert('用户名已被注册！');
                } else if (error.code === 203) {
                    alert('邮箱已被使用！请尝试其他用户名');
                } else {
                    alert('注册失败：' + error.message);
                }
            } finally {
                hideLoading();
            }
        }

        // 更新显示
        function updateDisplay() {
            if (!userData) return;
            
            document.getElementById('currentPoints').textContent = userData.currentPoints;
            
            // 更新任务列表
            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = '';
            userData.tasks.forEach(task => {
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task-item';
                taskDiv.innerHTML = `
                    <div>
                        <input type="checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask('${task.id}')">
                        <span class="${task.completed ? 'task-completed' : ''}">${task.name} (${task.points}点)</span>
                    </div>
                    <button class="danger" onclick="deleteTask('${task.id}')">删除</button>
                `;
                tasksList.appendChild(taskDiv);
            });

            // 更新可兑换奖励列表
            const rewardsList = document.getElementById('rewardsList');
            rewardsList.innerHTML = '';
            userData.rewards.filter(r => !r.redeemed).forEach(reward => {
                const rewardDiv = document.createElement('div');
                rewardDiv.className = 'reward-item';
                rewardDiv.innerHTML = `
                    <div>
                        <span>${reward.name} (${reward.requiredPoints}点)</span>
                    </div>
                    <button onclick="toggleReward('${reward.id}')">

                `;
                rewardsList.appendChild(rewardDiv);
            });

            // 更新已兑换奖励列表

            redeemedRewardsList.innerHTML = '';
            userData.rewards.filter(r => r.redeemed && !r.archived).forEach(reward => {
                const rewardDiv = document.createElement('div');
                rewardDiv.className = 'reward-item reward-redeemed';
                rewardDiv.innerHTML = `
                    <div>
                        <span>${reward.name} (${reward.requiredPoints}点)</span>
                    </div>

                        <button onclick="showArchiveModal('${reward.id}')">完成</button>
                        <button class="danger" onclick="toggleReward('${reward.id}')">取消兑换</button>
                    </div>

        // 计算总点数
        function calculateTotalPoints() {
            if (!userData.pointsHistory) return 0;
            
            let totalEarned = 0;
            let totalSpent = 0;
            
            userData.pointsHistory.forEach(record => {
                if (record.type === 'earn') {
                    totalEarned += record.points;
                } else {
                    totalSpent += record.points;
                }
            });
            
            return totalEarned - totalSpent;
        }

        // 更新总点数显示
        function updateTotalPoints() {
            const totalPoints = calculateTotalPoints();
            document.getElementById('totalPoints').textContent = totalPoints;
        }

        // 添加任务
        async function addTask() {
            const name = document.getElementById('taskName').value;
            const points = parseInt(document.getElementById('taskPoints').value);
            
            if (!name || !points) {
                alert('请填写完整信息！');
                return;
            }

            const task = {
                id: Date.now().toString(),
                name: name,
                points: points,
                completed: false,
                date: new Date().toLocaleDateString()
            };

            userData.tasks.push(task);

            updateDisplay();
            closeTaskModal();
        }

        // 切换任务状态
        async function toggleTask(taskId) {
            const task = userData.tasks.find(t => t.id === taskId);
            if (task) {
                if (!task.completed) {
                    userData.currentPoints += task.points;
                    // 添加积分流水记录
                    if (!userData.pointsHistory) userData.pointsHistory = [];
                    userData.pointsHistory.push({
                        type: 'earn',
                        points: task.points,
                        description: `完成任务：${task.name}`,
                        date: new Date().toLocaleString()
                    });
                } else {
                    userData.currentPoints -= task.points;
                    // 添加积分流水记录
                    if (!userData.pointsHistory) userData.pointsHistory = [];
                    userData.pointsHistory.push({
                        type: 'spend',
                        points: task.points,
                        description: `取消任务：${task.name}`,
                        date: new Date().toLocaleString()
                    });
                }
                task.completed = !task.completed;
                await saveUserData();
                updateDisplay();
            }
        }

        // 删除任务
        async function deleteTask(taskId) {
            const task = userData.tasks.find(t => t.id === taskId);
            if (task && task.completed) {
                userData.currentPoints -= task.points;
                // 添加积分流水记录
                if (!userData.pointsHistory) userData.pointsHistory = [];
                userData.pointsHistory.push({
                    type: 'spend',
                    points: task.points,
                    description: `删除任务：${task.name}`,
                    date: new Date().toLocaleString()
                });
            }
            userData.tasks = userData.tasks.filter(t => t.id !== taskId);
            await saveUserData();
            updateDisplay();
        }

        // 切换奖励状态
        async function toggleReward(rewardId) {
            const reward = userData.rewards.find(r => r.id === rewardId);
            if (reward) {
                if (!reward.redeemed) {
                    if (userData.currentPoints >= reward.requiredPoints) {
                        userData.currentPoints -= reward.requiredPoints;
                        reward.redeemed = true;
                        // 添加积分流水记录
                        if (!userData.pointsHistory) userData.pointsHistory = [];
                        userData.pointsHistory.push({
                            type: 'spend',
                            points: reward.requiredPoints,
                            description: `兑换奖励：${reward.name}`,
                            date: new Date().toLocaleString()
                        });
                    } else {
                        alert('点数不足！');
                        return;
                    }
                } else {
                    userData.currentPoints += reward.requiredPoints;
                    reward.redeemed = false;
                    // 添加积分流水记录
                    if (!userData.pointsHistory) userData.pointsHistory = [];
                    userData.pointsHistory.push({
                        type: 'earn',
                        points: reward.requiredPoints,
                        description: `取消奖励：${reward.name}`,
                        date: new Date().toLocaleString()
                    });
                }
                await saveUserData();
                updateDisplay();
            }
        }

        // 头像上传功能
        function uploadAvatar() {
            const fileInput = document.getElementById('avatarInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件！');
                return;
            }
            
            // 检查文件大小（限制为 2MB）
            if (file.size > 2 * 1024 * 1024) {
                alert('图片大小不能超过 2MB！');
                return;
            }
            
            showLoading();
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    // 检查用户是否登录且有数据
                    const currentUser = AV.User.current();
                    if (!currentUser || !userData) {
                        alert('用户未登录或数据加载失败！');
                        hideLoading();
                        return;
                    }
                    
                    // 将头像数据保存到用户数据中
                    userData.avatar = e.target.result;
                    await saveUserData();
                    
                    // 更新头像显示
                    const avatarImage = document.getElementById('avatarImage');
                    avatarImage.src = e.target.result;
                    
                    // 重置文件输入，允许重复选择同一文件
                    fileInput.value = '';
                    
                    hideLoading();

                } catch (error) {
                    console.error('保存头像失败:', error);
                    alert('头像保存失败，请重试');
                    hideLoading();
                }
            };
            
            reader.onerror = function() {
                console.error('文件读取失败');
                alert('文件读取失败，请重试');
                hideLoading();
            };
            
            reader.readAsDataURL(file);
        }

        async function resetPassword() {
            const username = document.getElementById('resetUsername').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username || !newPassword || !confirmPassword) {
                alert('请填写完整信息！');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('两次输入的密码不一致！');
                return;
            }

            if (newPassword.length < 6) {
                alert('密码至少6个字符！');
                return;
            }

            showLoading();
            try {
                // 先登录，再修改密码
                const user = await AV.User.logIn(username, "temp_password");
                // 如果登录成功，修改密码
                user.setPassword(newPassword);
                await user.save();
                alert('密码重置成功！');
                closeForgotPasswordModal();
            } catch (error) {
                console.error('重置密码失败:', error);
                
                // 如果是因为密码错误，尝试其他方式
                if (error.code === 210) {
                    // 重新创建用户（作为备选方案）
                    try {
                        const newUser = new AV.User();
                        newUser.setUsername(username);
                        newUser.setPassword(newPassword);
                        newUser.setEmail(`${username}@dummy.com`);
                        await newUser.signUp();
                        alert('账号已重新创建，请使用新密码登录！');
                        closeForgotPasswordModal();
                    } catch (createError) {
                        alert('无法重置密码，请联系管理员或创建新账号');
                    }
                } else {
                    alert('重置密码失败：' + error.message);
                }
            } finally {
                hideLoading();
            }
        }

        // 裁剪图片为缩略图
        function createThumbnail(imageFile, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 设置缩略图尺寸
                    const size = 250;
                    canvas.width = size;
                    canvas.height = size;
                    
                    // 计算裁剪区域
                    const ratio = Math.min(size / img.width, size / img.height);
                    const width = img.width * ratio;
                    const height = img.height * ratio;
                    const x = (size - width) / 2;
                    const y = (size - height) / 2;
                    
                    // 绘制缩略图
                    ctx.drawImage(img, x, y, width, height);
                    
                    // 获取缩略图数据
                    const thumbnail = canvas.toDataURL('image/jpeg', 0.8);
                    callback(thumbnail, e.target.result);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageFile);
        }

        // 保存归档
        async function saveArchive(reward, thoughts, thumbnail, originalImage) {
            // 添加到档案记录
            if (!userData.rewardsArchive) userData.rewardsArchive = [];
            userData.rewardsArchive.push({
                id: Date.now().toString(),
                name: reward.name,
                points: reward.requiredPoints,
                thoughts: thoughts,
                thumbnail: thumbnail,
                image: originalImage,
                date: new Date().toLocaleString(),
                hidden: false
            });

            await saveUserData();
            updateDisplay();
            closeArchiveModal();
        }

        // 模态框控制函数
        function showRegisterModal() {
            document.getElementById('registerModal').style.display = 'block';
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').style.display = 'none';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
        }

        function showForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').style.display = 'block';
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
            document.getElementById('resetUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        function showAddTaskModal() {
            document.getElementById('taskModal').style.display = 'block';
        }

        function closeTaskModal() {
            document.getElementById('taskModal').style.display = 'none';
            document.getElementById('taskName').value = '';
            document.getElementById('taskPoints').value = '';
        }

        function showAddRewardModal() {
            document.getElementById('rewardModal').style.display = 'block';
        }

        function closeRewardModal() {
            document.getElementById('rewardModal').style.display = 'none';
            document.getElementById('rewardName').value = '';
            document.getElementById('rewardPoints').value = '';
        }

        // 点击模态框外部关闭模态框
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
